# Deploy Node API to Azure App Service (Linux).
# Repo secrets: AZURE_WEBAPP_NAME, AZURE_WEBAPP_PUBLISH_PROFILE
# App Service application settings (Configuration): AZURE_SQL_*, CORS_ORIGINS, PORT (optional; App Service sets WEBSITES_PORT)
name: Deploy backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/azure-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install production dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
